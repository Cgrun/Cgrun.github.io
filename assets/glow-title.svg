<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="amberGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 1
                0 0.7 0 0 0.55
                0 0 0.2 0 0
                0 0 0 1 0" result="amberBlur"/>
      <feMerge>
        <feMergeNode in="amberBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="68"
        text-anchor="middle"
        font-family="Courier New, monospace"
        font-size="42"
        fill="#EB7F11"
        filter="url(#amberGlow)">
    CHANGRUN JIA
  <animate attributeName="opacity"
           values="0.25;1;0.25"
           keyTimes="0;0.5;1"
           calcMode="spline"
           keySplines="0.75 0 0.25 1; 0.75 0 0.25 1"
           dur="3.8s"
           repeatCount="indefinite"/>
    </text>
</svg>
