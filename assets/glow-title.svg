<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Orange-gold CRT glow matching #EB7F11 -->
    <filter id="crtOrangeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="glow1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="glow2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6.5" result="glow3"/>

      <feColorMatrix in="glow1" type="matrix"
        values="1 0 0 0 0.92
                0 1 0 0 0.50
                0 0 1 0 0.07
                0 0 0 1 0" result="orange1"/>

      <feColorMatrix in="glow2" type="matrix"
        values="1 0 0 0 0.92
                0 1 0 0 0.42
                0 0 1 0 0.04
                0 0 0 0.85 0" result="orange2"/>

      <feColorMatrix in="glow3" type="matrix"
        values="1 0 0 0 0.70
                0 1 0 0 0.28
                0 0 1 0 0.02
                0 0 0 0.55 0" result="orange3"/>

      <feMerge>
        <feMergeNode in="orange3"/>
        <feMergeNode in="orange2"/>
        <feMergeNode in="orange1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="68"
        text-anchor="middle"
        font-family="Courier New, Lucida Console, monospace"
        font-size="42"
        letter-spacing="2.2"
        fill="#EB7F11"
        filter="url(#crtOrangeGlow)"
        opacity="0.9">
    CHANGRUN JIA
    <animate attributeName="opacity"
             values="0.72;1;0.72"
             dur="3.8s"
             repeatCount="indefinite"/>
  </text>

  <text x="50%" y="68"
        text-anchor="middle"
        font-family="Courier New, Lucida Console, monospace"
        font-size="42"
        letter-spacing="2.2"
        fill="#ffb15a"
        opacity="0.18">
    CHANGRUN JIA
    <animate attributeName="opacity"
             values="0.72;1;0.72"
             dur="3.8s"
             repeatCount="indefinite"/>
  </text>
</svg>
